version: '3.8'

services:
  genesis-app:
    build: .
    container_name: genesis_web_app
    ports:
      - "8080:80"
    volumes:
      # This maps your local directory to the container. 
      # Any edits you make to HTML/CSS/JS will reflect immediately on browser refresh.
      - ./:/usr/share/nginx/html
    restart: unless-stopped
